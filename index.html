<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рекомпозиция 1.0 — Тренировка дома</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Рекомпозиция">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
        }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-200 min-h-screen pb-6 flex flex-col">

    <header class="bg-slate-900 border-b border-slate-800 sticky top-0 z-40 shadow-xl px-4 py-4 flex flex-col gap-4">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-lg font-bold text-emerald-400 tracking-wide">РЕКОМПОЗИЦИЯ 1.0</h1>
                <div class="flex items-center gap-1.5 mt-1">
                    <span id="wake-status-dot" class="w-2.5 h-2.5 rounded-full bg-slate-600"></span>
                    <span id="wake-status-text" class="text-xs text-slate-400">Экран: заблокирован</span>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <div id="timer-display" class="text-5xl font-mono font-bold text-emerald-400 w-24 text-right">30<span class="text-xl text-slate-500 font-sans ml-0.5">с</span></div>
                <button id="btn-start" onclick="toggleTimer()" class="bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold text-base px-6 py-3 rounded-xl transition shadow-lg active:scale-95">
                    Старт
                </button>
            </div>
        </div>

        <div class="flex justify-between items-center gap-2 border-t border-slate-800/60 pt-3">
            <span class="text-xs uppercase font-semibold text-slate-400">Отдых:</span>
            <div class="flex gap-2">
                <button onclick="setPreset(20)" class="preset-btn bg-slate-800 hover:bg-slate-700 text-slate-200 text-sm font-bold px-3.5 py-1.5 rounded-lg border border-slate-700 active:scale-95">20с</button>
                <button onclick="setPreset(30)" class="preset-btn bg-emerald-500/10 text-emerald-400 text-sm font-bold px-3.5 py-1.5 rounded-lg border border-emerald-500/30 active:scale-95">30с</button>
                <button onclick="setPreset(120)" class="preset-btn bg-slate-800 hover:bg-slate-700 text-slate-200 text-sm font-bold px-3.5 py-1.5 rounded-lg border border-slate-700 active:scale-95">2 мин</button>
            </div>
            <button onclick="resetTimer()" class="text-slate-400 hover:text-slate-200 text-xs font-semibold px-2 py-1 active:scale-95">Сброс</button>
        </div>
    </header>

    <main class="max-w-md mx-auto w-full px-4 mt-6 flex-1">
        <div class="flex justify-between items-center mb-4 px-1">
            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Упражнения</h2>
            <button onclick="resetAllSets()" class="text-xs text-rose-400 hover:text-rose-300 font-bold uppercase tracking-wider transition active:scale-95">
                Сбросить подходы ×
            </button>
        </div>
        
        <div id="exercises-list" class="space-y-4">
            </div>
    </main>

    <div id="focus-modal" class="hidden fixed inset-0 bg-[#0f172a] z-50 overflow-y-auto flex flex-col p-6">
        <div class="flex justify-between items-center border-b border-slate-800 pb-4">
            <div>
                <h3 id="modal-title" class="text-2xl font-bold text-emerald-400 leading-tight"></h3>
                <p id="modal-sets" class="text-sm text-slate-400 mt-1 font-semibold"></p>
            </div>
            <button onclick="closeFocus()" class="text-slate-400 hover:text-white text-4xl p-2 focus:outline-none">&times;</button>
        </div>

        <div class="flex-1 flex flex-col items-center justify-start py-8 gap-6">
            <div class="w-full max-w-[280px] aspect-square bg-slate-900 border border-slate-800 rounded-2xl flex items-center justify-center overflow-hidden shadow-2xl relative">
                <img id="modal-gif" src="" alt="Техника выполнения" class="w-full h-full object-cover hidden">
                <div id="modal-emoji" class="text-7xl animate-bounce"></div>
            </div>
            
            <div class="text-center w-full max-w-sm">
                <p id="modal-desc" class="text-slate-300 text-base leading-relaxed"></p>
            </div>

            <div class="bg-slate-900/80 border border-slate-800 rounded-2xl px-5 py-4 w-full max-w-sm flex flex-col gap-3 shadow-inner">
                <span class="text-xs text-slate-400 font-bold uppercase tracking-wider text-center">Выполненные подходы</span>
                <div class="flex justify-center gap-4" id="modal-sets-tracker">
                    </div>
            </div>
        </div>

        <div class="pt-4 border-t border-slate-800 mt-auto">
            <button onclick="closeFocus()" class="w-full bg-emerald-500 hover:bg-emerald-600 active:scale-95 text-slate-950 font-bold py-4 rounded-xl text-center text-lg shadow-lg transition">
                Выполнил подход • Закрыть
            </button>
        </div>
    </div>

    <script>
        // Обновленный массив упражнений с добавленным Бицепсом
        const exercises = [
            { id: 1, title: "Приседания с рюкзаком", sets: 3, reps: "15–20 раз", desc: "Держи рюкзак на груди перед собой. Спина ровная, лопатки собраны. Опускайся до параллели с полом, не отрывая пятки от пола.", emoji: "🏋️‍♂️", gif: "gifs/squats.gif" },
            { id: 2, title: "Отжимания от пола", sets: 3, reps: "на максимум", desc: "Тело ровное, как доска. Напряги пресс и ягодицы. Локти уходят назад под углом 45 градусов. Не прогибай поясницу вниз.", emoji: "🤸‍♂️", gif: "gifs/pushups.gif" },
            { id: 3, title: "Обратные отжимания", sets: 3, reps: "10–12 раз", desc: "Руками опирайся о край дивана или стула. Спину держи ближе к опоре. Медленно опускайся вниз до угла 90° в локтевых суставах.", emoji: "🪑", gif: "gifs/dips.gif" },
            { id: 4, title: "Тяга рюкзака к поясу (в наклоне)", sets: 3, reps: "12–15 раз (на руку)", desc: "Опора на диван рукой и коленом. Спина идеально ровная, параллельно полу. Тяни рюкзак к бедру за счет мышц спины, сводя лопатку.", emoji: "🎒", gif: "gifs/rows.gif" },
            { id: 5, title: "Сгибания на бицепс с рюкзаком", sets: 3, reps: "12–15 раз", desc: "Возьми рюкзак за верхнюю ручку или лямки. Прижми локти к бокам. Сгибай руки в локтях, поднимая рюкзак к груди. Корпусом не раскачивай.", emoji: "💪", gif: "gifs/curls.gif" },
            { id: 6, title: "Ягодичный мостик", sets: 3, reps: "20 раз", desc: "Лежа на спине, согни колени. Силой ягодиц выталкивай таз вверх, задерживаясь на секунду. Не прогибайся избыточно в пояснице.", emoji: "🧘‍♂️", gif: "gifs/bridge.gif" },
            { id: 7, title: "Планка на локтях", sets: 3, reps: "45–60 секунд", desc: "Локти строго под плечами. Пресс зажат до предела, таз слегка подкручен вперед (не давай пояснице провисать вниз).", emoji: "⏱️", gif: "gifs/plank.gif" }
        ];

        // Инициализация подходов
        if(!localStorage.getItem('sets_state')) {
            localStorage.setItem('sets_state', JSON.stringify({}));
        }

        let timer;
        let defaultTime = 30;
        let timeLeft = 30;
        let isRunning = false;
        let wakeLock = null;

        // Генерация карточек упражнений
        const listContainer = document.getElementById('exercises-list');
        exercises.forEach(ex => {
            const card = document.createElement('div');
            card.className = "bg-slate-800 border border-slate-700 hover:border-emerald-500/50 rounded-2xl p-5 flex items-center justify-between cursor-pointer transition shadow-md active:scale-98";
            card.onclick = () => openFocus(ex.id);
            card.innerHTML = `
                <div class="flex items-center gap-4">
                    <div class="bg-emerald-500/10 text-emerald-400 p-3 rounded-xl text-3xl flex-shrink-0">${ex.emoji}</div>
                    <div>
                        <h3 class="font-bold text-slate-100 text-base">${ex.id}. ${ex.title}</h3>
                        <p class="text-sm text-emerald-400 font-semibold mt-1">${ex.sets} подх. × ${ex.reps}</p>
                    </div>
                </div>
                <div class="text-slate-500 text-sm font-medium flex items-center gap-1">
                    <span>Фокус</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </div>
            `;
            listContainer.appendChild(card);
        });

        // Функция принудительного сброса всех подходов
        function resetAllSets() {
            if (confirm("Сбросить весь прогресс по подходам для начала новой тренировки?")) {
                localStorage.setItem('sets_state', JSON.stringify({}));
                alert("Прогресс сброшен! Отличной новой тренировки 💪");
            }
        }

        // Блокировка сна экрана
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    document.getElementById('wake-status-dot').className = "w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse";
                    document.getElementById('wake-status-text').innerText = "Экран: активен";
                    document.getElementById('wake-status-text').className = "text-xs text-emerald-400 font-semibold";
                } catch (err) {
                    console.log("Wake Lock Error:", err.message);
                }
            }
        }

        function releaseWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release().then(() => {
                    wakeLock = null;
                    document.getElementById('wake-status-dot').className = "w-2.5 h-2.5 rounded-full bg-slate-600";
                    document.getElementById('wake-status-text').innerText = "Экран: заблокирован";
                    document.getElementById('wake-status-text').className = "text-xs text-slate-400";
                });
            }
        }

        document.addEventListener('visibilitychange', () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                requestWakeLock();
            }
        });

        requestWakeLock();

        // Работа с таймером
        function updateDisplay() {
            document.getElementById('timer-display').innerHTML = `${timeLeft}<span class="text-xl text-slate-500 font-sans ml-0.5">с</span>`;
        }

        function toggleTimer() {
            const startBtn = document.getElementById('btn-start');
            if (isRunning) {
                clearInterval(timer);
                startBtn.innerText = 'Старт';
                startBtn.className = "bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold text-base px-6 py-3 rounded-xl transition shadow-lg active:scale-95";
                releaseWakeLock();
            } else {
                requestWakeLock();
                startBtn.innerText = 'Пауза';
                startBtn.className = "bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold text-base px-6 py-3 rounded-xl transition shadow-lg active:scale-95";
                timer = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateDisplay();
                    } else {
                        clearInterval(timer);
                        isRunning = false;
                        startBtn.innerText = 'Старт';
                        startBtn.className = "bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold text-base px-6 py-3 rounded-xl transition shadow-lg active:scale-95";
                        
                        if ('vibrate' in navigator) navigator.vibrate([200, 100, 200]);
                        alert("Время отдыха вышло!");
                        
                        timeLeft = defaultTime;
                        updateDisplay();
                    }
                }, 1000);
            }
            isRunning = !isRunning;
        }

        function setPreset(seconds) {
            clearInterval(timer);
            isRunning = false;
            defaultTime = seconds;
            timeLeft = seconds;
            updateDisplay();
            document.getElementById('btn-start').innerText = 'Старт';
            document.getElementById('btn-start').className = "bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold text-base px-6 py-3 rounded-xl transition shadow-lg active:scale-95";
            
            document.querySelectorAll('.preset-btn').forEach(btn => {
                btn.className = "preset-btn bg-slate-800 hover:bg-slate-700 text-slate-200 text-sm font-bold px-3.5 py-1.5 rounded-lg border border-slate-700 active:scale-95";
            });
            event.target.className = "preset-btn bg-emerald-500/10 text-emerald-400 text-sm font-bold px-3.5 py-1.5 rounded-lg border border-emerald-500/30 active:scale-95";
        }

        function resetTimer() {
            clearInterval(timer);
            isRunning = false;
            timeLeft = defaultTime;
            updateDisplay();
            document.getElementById('btn-start').innerText = 'Старт';
            document.getElementById('btn-start').className = "bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold text-base px-6 py-3 rounded-xl transition shadow-lg active:scale-95";
        }

        // Логика фокуса
        function openFocus(id) {
            const ex = exercises.find(e => e.id === id);
            document.getElementById('modal-title').innerText = ex.title;
            document.getElementById('modal-sets').innerText = `Цель: 3 подхода по ${ex.reps}`;
            document.getElementById('modal-desc').innerText = ex.desc;
            
            const gifImg = document.getElementById('modal-gif');
            const emojiDiv = document.getElementById('modal-emoji');
            
            gifImg.src = ex.gif;
            gifImg.onload = () => {
                gifImg.classList.remove('hidden');
                emojiDiv.classList.add('hidden');
            };
            gifImg.onerror = () => {
                gifImg.classList.add('hidden');
                emojiDiv.classList.remove('hidden');
                emojiDiv.innerText = ex.emoji;
            };

            renderSetsTracker(id, ex.sets);

            document.getElementById('focus-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            requestWakeLock();
        }

        function closeFocus() {
            document.getElementById('focus-modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function renderSetsTracker(exerciseId, totalSets) {
            const tracker = document.getElementById('modal-sets-tracker');
            tracker.innerHTML = '';
            
            const state = JSON.parse(localStorage.getItem('sets_state')) || {};
            const doneSets = state[exerciseId] || 0;

            for (let i = 1; i <= totalSets; i++) {
                const dot = document.createElement('button');
                if (i <= doneSets) {
                    dot.className = "w-10 h-10 rounded-full bg-emerald-500 text-slate-950 font-bold text-sm flex items-center justify-center shadow-md";
                    dot.innerText = "✓";
                } else {
                    dot.className = "w-10 h-10 rounded-full bg-slate-800 border border-slate-700 text-slate-300 font-bold text-sm flex items-center justify-center hover:border-emerald-500 active:scale-90 transition";
                    dot.innerText = i;
                }
                
                dot.onclick = () => {
                    const currentState = JSON.parse(localStorage.getItem('sets_state')) || {};
                    currentState[exerciseId] = i === doneSets ? i - 1 : i;
                    localStorage.setItem('sets_state', JSON.stringify(currentState));
                    renderSetsTracker(exerciseId, totalSets);
                };

                tracker.appendChild(dot);
            }
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log('Service Worker Registered'))
            .catch(err => console.log('SW registration failed:', err));
        }
    </script>
</body>
</html>
