<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рекомпозиция 1.0 — Тренировка дома</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Рекомпозиция">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
        }
        /* Скрытие скроллбара для чистоты интерфейса */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-200 min-h-screen pb-6 flex flex-col">

    <header class="bg-slate-900 border-b border-slate-800 sticky top-0 z-40 shadow-xl px-4 py-3 flex flex-col gap-3">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-md font-bold text-emerald-400 tracking-wide">РЕКОМПОЗИЦИЯ 1.0</h1>
                <div class="flex items-center gap-1.5 mt-0.5">
                    <span id="wake-status-dot" class="w-2 h-2 rounded-full bg-slate-600 animate-pulse"></span>
                    <span id="wake-status-text" class="text-[10px] text-slate-400">Экран: заблокирован</span>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <div id="timer-display" class="text-3xl font-mono font-bold text-emerald-400 w-16 text-center">30<span class="text-xs text-slate-500">с</span></div>
                <button id="btn-start" onclick="toggleTimer()" class="bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold text-xs px-4 py-2 rounded-lg transition">
                    Старт
                </button>
            </div>
        </div>

        <div class="flex justify-between items-center gap-2 border-t border-slate-800/60 pt-2">
            <span class="text-[10px] uppercase font-semibold text-slate-500">Отдых:</span>
            <div class="flex gap-1.5">
                <button onclick="setPreset(20)" class="preset-btn bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs px-2.5 py-1 rounded-md border border-slate-700">20с</button>
                <button onclick="setPreset(30)" class="preset-btn bg-emerald-500/10 text-emerald-400 text-xs px-2.5 py-1 rounded-md border border-emerald-500/30">30с</button>
                <button onclick="setPreset(120)" class="preset-btn bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs px-2.5 py-1 rounded-md border border-slate-700">2 мин</button>
            </div>
            <button onclick="resetTimer()" class="text-slate-500 hover:text-slate-300 text-xs px-2 py-1">Сброс</button>
        </div>
    </header>

    <main class="max-w-md mx-auto w-full px-4 mt-4 flex-1">
        <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-3 px-1">Упражнения (клик для фокуса)</h2>
        <div id="exercises-list" class="space-y-3">
            </div>
    </main>

    <div id="focus-modal" class="hidden fixed inset-0 bg-slate-950/98 z-50 flex flex-col justify-between p-6">
        <div class="flex justify-between items-center border-b border-slate-900 pb-4">
            <div>
                <h3 id="modal-title" class="text-xl font-bold text-emerald-400"></h3>
                <p id="modal-sets" class="text-xs text-slate-400 mt-1"></p>
            </div>
            <button onclick="closeFocus()" class="text-slate-400 hover:text-white text-3xl font-light">&times;</button>
        </div>

        <div class="flex-1 flex flex-col justify-center items-center my-6 gap-6">
            <div class="w-full max-w-xs aspect-square bg-slate-900/50 border border-slate-800 rounded-2xl flex items-center justify-center overflow-hidden shadow-inner">
                <img id="modal-gif" src="" alt="Техника выполнения" class="w-full h-full object-cover hidden">
                <div id="modal-emoji" class="text-7xl animate-bounce"></div>
            </div>
            
            <div class="text-center px-4">
                <p id="modal-desc" class="text-slate-300 text-sm leading-relaxed max-w-xs mx-auto"></p>
            </div>

            <div class="bg-slate-900 border border-slate-800 rounded-xl px-4 py-2.5 flex items-center gap-3">
                <span class="text-xs text-slate-500 font-semibold uppercase">Подходы:</span>
                <div class="flex gap-1.5" id="modal-sets-tracker">
                    </div>
            </div>
        </div>

        <button onclick="closeFocus()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold py-4 rounded-xl text-center shadow-lg transition">
            Выполнил подход • Закрыть
        </button>
    </div>

    <script>
        // Данные упражнений
        const exercises = [
            { id: 1, title: "Приседания с рюкзаком", sets: 3, reps: "15–20 раз", desc: "Держи рюкзак на груди перед собой. Спина ровная, лопатки собраны. Опускайся до параллели с полом, не отрывая пятки.", emoji: "🏋️‍♂️", gif: "gifs/squats.gif" },
            { id: 2, title: "Отжимания от пола", sets: 3, reps: "на максимум", desc: "Тело ровное, как доска. Напряги пресс и ягодицы. Локти идут назад под углом 45 градусов. Тяжело? Делай с колен.", emoji: "🤸‍♂️", gif: "gifs/pushups.gif" },
            { id: 3, title: "Обратные отжимания", sets: 3, reps: "10–12 раз", desc: "Руками опирайся о край дивана или стула. Спину держи ближе к опоре. Медленно опускайся вниз до угла 90° в локтях.", emoji: "🪑", gif: "gifs/dips.gif" },
            { id: 4, title: "Тяга рюкзака к поясу", sets: 3, reps: "12–15 раз (на руку)", desc: "Опорой выступает диван. Спина абсолютно ровная. Тяни рюкзак к карману брюк по дуге, работая лопаткой, а не силой руки.", emoji: "🎒", gif: "gifs/rows.gif" },
            { id: 5, title: "Ягодичный мостик", sets: 3, reps: "20 раз", desc: "Лежа на спине, согни колени. Силой ягодиц выталкивай таз вверх, задерживаясь на секунду. Поясницу вверху не прогибай.", emoji: "🧘‍♂️", gif: "gifs/bridge.gif" },
            { id: 6, title: "Планка на локтях", sets: 3, reps: "45–60 секунд", desc: "Локти строго под плечами. Пресс зажат до предела, таз подкручен вперед (не давай пояснице провисать вниз).", emoji: "⏱️", gif: "gifs/plank.gif" }
        ];

        // Инициализация подходов в localStorage, если их нет
        if(!localStorage.getItem('sets_state')) {
            localStorage.setItem('sets_state', JSON.stringify({}));
        }

        let timer;
        let defaultTime = 30;
        let timeLeft = 30;
        let isRunning = false;
        let wakeLock = null;

        // Генерация карточек упражнений
        const listContainer = document.getElementById('exercises-list');
        exercises.forEach(ex => {
            const card = document.createElement('div');
            card.className = "bg-slate-800 border border-slate-700 hover:border-emerald-500/50 rounded-xl p-4 flex items-center justify-between cursor-pointer transition shadow-md";
            card.onclick = () => openFocus(ex.id);
            card.innerHTML = `
                <div class="flex items-center gap-3">
                    <div class="bg-emerald-500/10 text-emerald-400 p-2.5 rounded-lg text-xl">${ex.emoji}</div>
                    <div>
                        <h3 class="font-bold text-slate-200 text-sm">${ex.id}. ${ex.title}</h3>
                        <p class="text-xs text-emerald-400 font-medium mt-0.5">${ex.sets} подх. × ${ex.reps}</p>
                    </div>
                </div>
                <div class="text-slate-500 text-xs">Фокус →</div>
            `;
            listContainer.appendChild(card);
        });

        // Работа с Wake Lock (Экран не гаснет)
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    document.getElementById('wake-status-dot').className = "w-2 h-2 rounded-full bg-emerald-500 animate-ping";
                    document.getElementById('wake-status-text').innerText = "Экран: активен";
                    document.getElementById('wake-status-text').className = "text-[10px] text-emerald-400 font-semibold";
                } catch (err) {
                    console.log("Wake Lock Error:", err.message);
                }
            }
        }

        function releaseWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release().then(() => {
                    wakeLock = null;
                    document.getElementById('wake-status-dot').className = "w-2 h-2 rounded-full bg-slate-600";
                    document.getElementById('wake-status-text').innerText = "Экран: заблокирован";
                    document.getElementById('wake-status-text').className = "text-[10px] text-slate-400";
                });
            }
        }

        // Авто-запрос блокировки экрана при активности страницы
        document.addEventListener('visibilitychange', () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                requestWakeLock();
            }
        });

        // Запуск при старте
        requestWakeLock();

        // Функции таймера
        function updateDisplay() {
            document.getElementById('timer-display').innerHTML = `${timeLeft}<span class="text-xs text-slate-500">с</span>`;
        }

        function toggleTimer() {
            const startBtn = document.getElementById('btn-start');
            if (isRunning) {
                clearInterval(timer);
                startBtn.innerText = 'Старт';
                startBtn.className = "bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold text-xs px-4 py-2 rounded-lg transition";
                releaseWakeLock();
            } else {
                requestWakeLock(); // Убеждаемся, что экран не уснет во время отсчета
                startBtn.innerText = 'Пауза';
                startBtn.className = "bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold text-xs px-4 py-2 rounded-lg transition";
                timer = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateDisplay();
                    } else {
                        clearInterval(timer);
                        isRunning = false;
                        startBtn.innerText = 'Старт';
                        startBtn.className = "bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold text-xs px-4 py-2 rounded-lg transition";
                        
                        // Сигналы окончания
                        if ('vibrate' in navigator) navigator.vibrate([200, 100, 200]);
                        alert("Время отдыха вышло!");
                        
                        // Сброс на дефолтное состояние текущего пресета
                        timeLeft = defaultTime;
                        updateDisplay();
                    }
                }, 1000);
            }
            isRunning = !isRunning;
        }

        function setPreset(seconds) {
            clearInterval(timer);
            isRunning = false;
            defaultTime = seconds;
            timeLeft = seconds;
            updateDisplay();
            document.getElementById('btn-start').innerText = 'Старт';
            document.getElementById('btn-start').className = "bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold text-xs px-4 py-2 rounded-lg transition";
            
            // Визуальный переключатель активной кнопки
            document.querySelectorAll('.preset-btn').forEach(btn => {
                btn.className = "preset-btn bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs px-2.5 py-1 rounded-md border border-slate-700";
            });
            event.target.className = "preset-btn bg-emerald-500/10 text-emerald-400 text-xs px-2.5 py-1 rounded-md border border-emerald-500/30";
        }

        function resetTimer() {
            clearInterval(timer);
            isRunning = false;
            timeLeft = defaultTime;
            updateDisplay();
            document.getElementById('btn-start').innerText = 'Старт';
            document.getElementById('btn-start').className = "bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold text-xs px-4 py-2 rounded-lg transition";
        }

        // Функции фокус-модалки
        function openFocus(id) {
            const ex = exercises.find(e => e.id === id);
            document.getElementById('modal-title').innerText = ex.title;
            document.getElementById('modal-sets').innerText = `Цель: 3 подхода по ${ex.reps}`;
            document.getElementById('modal-desc').innerText = ex.desc;
            
            const gifImg = document.getElementById('modal-gif');
            const emojiDiv = document.getElementById('modal-emoji');
            
            // Если гифка существует, пробуем ее загрузить, иначе показываем эмодзи
            gifImg.src = ex.gif;
            gifImg.onload = () => {
                gifImg.classList.remove('hidden');
                emojiDiv.classList.add('hidden');
            };
            gifImg.onerror = () => {
                gifImg.classList.add('hidden');
                emojiDiv.classList.remove('hidden');
                emojiDiv.innerText = ex.emoji;
            };

            // Рендер трекера подходов
            renderSetsTracker(id, ex.sets);

            document.getElementById('focus-modal').classList.remove('hidden');
            requestWakeLock();
        }

        function closeFocus() {
            document.getElementById('focus-modal').classList.add('hidden');
        }

        function renderSetsTracker(exerciseId, totalSets) {
            const tracker = document.getElementById('modal-sets-tracker');
            tracker.innerHTML = '';
            
            const state = JSON.parse(localStorage.getItem('sets_state')) || {};
            const doneSets = state[exerciseId] || 0;

            for (let i = 1; i <= totalSets; i++) {
                const dot = document.createElement('button');
                if (i <= doneSets) {
                    dot.className = "w-8 h-8 rounded-full bg-emerald-500 text-slate-950 font-bold text-xs flex items-center justify-center";
                    dot.innerText = "✓";
                } else {
                    dot.className = "w-8 h-8 rounded-full bg-slate-800 border border-slate-700 text-slate-400 font-bold text-xs flex items-center justify-center hover:border-emerald-500";
                    dot.innerText = i;
                }
                
                // Тап по кружку меняет количество выполненных подходов
                dot.onclick = () => {
                    const currentState = JSON.parse(localStorage.getItem('sets_state')) || {};
                    currentState[exerciseId] = i === doneSets ? i - 1 : i; // сброс при повторном клике на текущий
                    localStorage.setItem('sets_state', JSON.stringify(currentState));
                    renderSetsTracker(exerciseId, totalSets);
                };

                tracker.appendChild(dot);
            }
        }

        // Регистрация Service Worker для PWA (Убирает адресную строку!)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log('Service Worker Registered'))
            .catch(err => console.log('SW registration failed:', err));
        }
    </script>
</body>
</html>
